# Expectations for the otel-windows-standalone chart E2E.

logs:
  min_count: 1
  required_attributes:
    - host.name
    - host.id
    - service.name
    - e2e.run_id

traces:
  min_count: 1
  required_attributes:
    - service.name
    - e2e.run_id

metrics:
  min_count: 1
  required_labels:
    - cx_application_name
    - cx_subsystem_name
    - host_name
    - e2e_run_id

collector_health:
  max_send_failures: 0
