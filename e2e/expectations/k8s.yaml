# Expectations for the otel-integration K8S Helm chart E2E.
# Adds k8s.* attributes that the chart's k8sattributes processor should attach.

logs:
  min_count: 1
  required_attributes:
    # k8sattributes processor adds these to every log.
    - k8s.namespace.name
    - k8s.node.name
    - service.name
    - e2e.run_id

traces:
  min_count: 1
  required_attributes:
    - service.name
    - e2e.run_id

metrics:
  min_count: 1
  required_labels:
    - cx_application_name
    - cx_subsystem_name
    - k8s_namespace_name
    - k8s_node_name
    - e2e_run_id

collector_health:
  max_send_failures: 0
