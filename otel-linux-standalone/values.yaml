global:
  domain: "coralogix.com"
  defaultApplicationName: "otel"
  defaultSubsystemName: "linux"
  logLevel: "info"
  collectionInterval: "30s"
  version: "0.0.45"
  # deploymentEnvironmentName: "development"

opentelemetry-agent:
  enabled: true
  distribution: "standalone"
  presets:
    metadata:
      enabled: true
      integrationName: "coralogix-linux-standalone"
    hostEntityEvents:
      enabled: true
    fleetManagement:
      enabled: true
      agentType: "agent"
    hostMetrics:
      enabled: true
      # Enables process metrics scraping.
      # Disabled by default, requires privilleged mode
      process:
        enabled: false # Requires: sudo setcap cap_sys_ptrace,cap_dac_read_search=+ep /usr/bin/otelcol-contrib
    batch:
      enabled: true
      # sendBatchSize: 1024
      # sendBatchMaxSize: 2048
      # timeout: "1s"
    
    # Detects cloud provider and system resource attributes
    # Based on the provider, "aws | azure | gcp | on-prem | "" (empty = use all))
    resourceDetection:
      enabled: true
      provider: ""
    # Removes a subset of attributes to be sent to Coralogix. It uses a denylist policy.
    reduceResourceAttributes:
      enabled: true
      pipelines: ["all"]
      provider: ""
    # Collects systemd journal logs
    journaldReceiver:
      enabled: true
      # Enables dynamic subsystem naming based on _SYSTEMD_UNIT or SYSLOG_IDENTIFIER
      dynamicSubsystemName: true
      # units:
      #   - docker.service
      #   - sshd.service
      # matches:
      #   - _SYSTEMD_UNIT: nginx.service
      #   - PRIORITY: "5"
    
    # Collects systemd unit state metrics
    systemdReceiver:
      enabled: true
      collectionInterval: "30s"
      scope: system  # system or user
      # units:
      #   - docker.service
      #   - sshd.service
 
    collectorMetrics:
      enabled: true
      scrapeInterval: "{{.Values.global.collectionInterval}}"
    
    otlpReceiver:
      enabled: true
    
    # Receives StatsD metrics on UDP port 8125
    statsdReceiver:
      enabled: false
    
    spanMetrics:
      enabled: true
      collectionInterval: "{{.Values.global.collectionInterval}}"
      metricsExpiration: 5m
    
    # spanMetricsMulti:
    #   enabled: false
    #   collectionInterval: "{{.Values.global.collectionInterval}}"
    #   metricsExpiration: 5m
    
    # headSampling:
    #   enabled: false
    #   percentage: 10
    #   mode: "proportional"
    
    transactions:
      enabled: true
      waitDuration: 30s
    
    zpages:
      enabled: true
    
    pprof:
      enabled: true
    
    semconv:
      enabled: true
    
    coralogixExporter:
      enabled: true
      privateKey: ${env:CORALOGIX_PRIVATE_KEY}
    
    # Configures multiple Prometheus scrape targets (disabled by default)
    # Use this to scrape metrics from application exporters
    prometheusMulti:
      enabled: false
      receivers: []
      # Example configuration:
      # - name: mysql-metrics
      #   scrapeInterval: 30s
      #   targets:
      #     - endpoint: "mysql-exporter:9104"
      #       labels:
      #         env: "production"
      #   applicationName: "my-app"
      #   subsystemName: "mysql"
      # - name: redis-metrics
      #   scrapeInterval: 30s
      #   targets:
      #     - endpoint: "redis-exporter:9121"
      #   subsystemName: "redis"
    
    # Collects logs from multiple file paths (disabled by default)
    # Use this to collect application log files
    filelogMulti:
      enabled: false
      receivers: []
      # Example configuration:
      # - name: backend-logs
      #   include:
      #     - /var/log/messages
      #     - /var/log/app/*.log
      #   exclude:
      #     - /var/log/app/*.gz
      #   forceFlushPeriod: "0"
      #   startAt: beginning
      #   multiline:
      #     lineStartPattern: "^\\d{4}-"
      #     lineEndPattern: "END$"
      #     omitPattern: false
      #   applicationName: "my-app"
      #   subsystemName: "backend"
      #   # Or use attributes for dynamic naming:
      #   # applicationNameAttribute: "service.namespace"
      #   # subsystemNameAttribute: "service.name"
      #   extraOperators:
      #     - type: regex_parser
      #       regex: '^(?P<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<sev>[A-Z]*) (?P<msg>.*)$'
      #       timestamp:
      #         parse_from: attributes.time
      #         layout: '%Y-%m-%d %H:%M:%S'
      #       severity:
      #         parse_from: attributes.sev

  config:
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: ${env:OTEL_MEMORY_LIMIT_MIB:-512}
    service:
      pipelines:
        logs:
          exporters: []
        metrics:
          exporters: []
        traces:
          exporters: []

# OpenTelemetry eBPF Instrumentation (OBI)
# ----------------------------------------
# OBI captures application spans & metrics via eBPF (zero-code instrumentation)
# and ships them to the local collector over OTLP. On a standalone Linux host it
# runs as a systemd unit (obi.service) as root, alongside the otelcol-contrib
# service (see terraform/); this section only renders the OBI configuration file
# that the unit reads. It mirrors the k8s-helm OBI config, with the k8s-only bits
# removed (Kubernetes metadata, k8s cache, k8s owner-name network filters) and
# host-process discovery (open_ports/exe_path) in place of the Kubernetes
# namespace selector.
#
# Rendered with: `make obi-config` (which passes --set obi.enabled=true).
# Disabled by default; enable the unit via the Terraform `enable_obi` variable.
obi:
  # Only used at render time to gate the OBI ConfigMap; the deploy toggle is the
  # Terraform `enable_obi` variable.
  enabled: false
  # The full OBI configuration document, rendered verbatim to the file OBI reads
  # (OTEL_EBPF_CONFIG_PATH). OBI exports over OTLP to the local collector
  # (127.0.0.1:4317 gRPC for traces / 4318 HTTP for metrics).
  config:
    discovery:
      instrument:
        # Instrument every process with a listening port. Narrow this (e.g. a
        # port range or exe_path globs) to scope instrumentation.
        - open_ports: "1-65535"
      exclude_instrument:
        - exe_path: "*ebpf-instrument*"
        - exe_path: "*otelcol*"
        - exe_path: "*obi*"
    attributes:
      select:
        '*':
          include:
            - gen_ai.*
    ebpf:
      buffer_sizes:
        http: 2048
        kafka: 4096
        mysql: 4096
        postgres: 4096
      payload_extraction:
        http:
          aws:
            enabled: true
          elasticsearch:
            enabled: true
          genai:
            anthropic:
              enabled: true
            embedding:
              enabled: true
            gemini:
              enabled: true
            mcp:
              enabled: true
            openai:
              enabled: true
            qwen:
              enabled: true
            rerank:
              enabled: true
            retrieval:
              enabled: true
          graphql:
            enabled: true
          jsonrpc:
            enabled: true
          sqlpp:
            enabled: true
      redis_db_cache:
        enabled: true
    health_check:
      port: 0
    otel_metrics_export:
      endpoint: http://127.0.0.1:4318
    otel_traces_export:
      endpoint: http://127.0.0.1:4317
    prometheus_export:
      path: /metrics
      port: 9090
