exporters:
  coralogix:
    application_name: otel
    application_name_attributes:
    - cx.application.name
    - service.namespace
    domain: eu2.coralogix.com
    domain_settings:
      keepalive:
        enabled: true
        permit_without_stream: false
        time: 30s
        timeout: 10s
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.44
    metrics:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.44
    private_key: ${env:CORALOGIX_PRIVATE_KEY}
    profiles:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.44
        x-coralogix-ingress: otlp/v1.10.0
    sending_queue:
      batch:
        flush_timeout: 250ms
        max_size: 2097152
        min_size: 1048576
        sizer: bytes
      enabled: true
      num_consumers: 20
      queue_size: 209715200
      sizer: bytes
    subsystem_name: windows
    subsystem_name_attributes:
    - cx.subsystem.name
    - service.name
    timeout: 30s
    traces:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.44
  coralogix/resource_catalog:
    application_name: resource
    domain: eu2.coralogix.com
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.44
        x-coralogix-ingress: metadata-as-otlp-logs/v1
    private_key: ${CORALOGIX_PRIVATE_KEY}
    sending_queue:
      batch:
        flush_timeout: 250ms
        max_size: 2097152
        min_size: 1048576
        sizer: bytes
      enabled: true
      num_consumers: 20
      queue_size: 209715200
      sizer: bytes
    subsystem_name: catalog
    timeout: 30s
  debug: {}
extensions:
  file_storage:
    create_directory: true
    directory: C:\ProgramData\OpenTelemetry\Collector\storage
  health_check:
    endpoint: ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}:13133
  opamp:
    agent_description:
      include_resource_attributes: true
      non_identifying_attributes:
        cx.agent.type: agent
        helm.chart.opentelemetry-agent.version: 0.135.0
    server:
      http:
        endpoint: https://ingress.eu2.coralogix.com/opamp/v1
        headers:
          Authorization: Bearer ${env:CORALOGIX_PRIVATE_KEY}
        polling_interval: 2m
  pprof:
    endpoint: localhost:1777
  zpages:
    endpoint: localhost:55679
processors:
  batch:
    send_batch_max_size: 2048
    send_batch_size: 1024
    timeout: 1s
  memory_limiter:
    check_interval: 5s
    limit_mib: ${env:OTEL_MEMORY_LIMIT_MIB:-1024}
  resource/metadata:
    attributes:
    - action: upsert
      key: cx.otel_integration.name
      value: coralogix-windows-standalone
  resourcedetection/entity:
    detectors:
    - system
    - env
    override: false
    system:
      resource_attributes:
        host.cpu.cache.l2.size:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.description:
          enabled: true
    timeout: 2s
  resourcedetection/env:
    detectors:
    - system
    - env
    override: false
    system:
      resource_attributes:
        host.id:
          enabled: true
    timeout: 2s
  resourcedetection/region:
    detectors:
    - gcp
    - ec2
    - azure
    override: true
    timeout: 2s
  transform/entity-event:
    error_mode: silent
    log_statements:
    - context: log
      statements:
      - set(log.attributes["otel.entity.id"]["host.id"], resource.attributes["host.id"])
      - merge_maps(log.attributes, resource.attributes, "insert")
    - context: resource
      statements:
      - keep_keys(resource.attributes, [""])
  transform/iis:
    error_mode: ignore
    log_statements:
    - context: log
      statements:
      - set(log.attributes["client.address"], log.attributes["c-ip"]) where log.attributes["c-ip"]
        != nil
      - set(log.attributes["http.request.method"], log.attributes["cs-method"]) where
        log.attributes["cs-method"] != nil
      - set(log.attributes["http.response.status_code"], log.attributes["sc-status"])
        where log.attributes["sc-status"] != nil
      - set(log.attributes["user_agent.original"], log.attributes["cs(User-Agent)"])
        where log.attributes["cs(User-Agent)"] != nil
      - set(log.attributes["url.path"], log.attributes["cs-uri-stem"]) where log.attributes["cs-uri-stem"]
        != nil
      - set(log.attributes["url.query"], log.attributes["cs-uri-query"]) where log.attributes["cs-uri-query"]
        != nil
      - set(log.attributes["http.request.header.referer"], [log.attributes["cs(Referer)"]])
        where log.attributes["cs(Referer)"] != nil
      - set(log.attributes["http.server.request.duration_ms"], Int(log.attributes["time-taken"]))
        where log.attributes["time-taken"] != nil
      - delete_key(log.attributes, "c-ip")
      - delete_key(log.attributes, "cs-method")
      - delete_key(log.attributes, "sc-status")
      - delete_key(log.attributes, "cs(User-Agent)")
      - delete_key(log.attributes, "cs-uri-stem")
      - delete_key(log.attributes, "cs-uri-query")
      - delete_key(log.attributes, "cs(Referer)")
      - delete_key(log.attributes, "time-taken")
      - delete_key(log.attributes, "sc-win32-status")
      - delete_key(log.attributes, "s-port")
  transform/prometheus:
    error_mode: ignore
    metric_statements:
    - context: metric
      statements:
      - replace_pattern(metric.name, "_total$", "") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_cpu_seconds_seconds$", "otelcol_process_cpu_seconds")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_heap_alloc_bytes_bytes$",
        "otelcol_process_runtime_heap_alloc_bytes") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_total_alloc_bytes_bytes$",
        "otelcol_process_runtime_total_alloc_bytes") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_total_sys_memory_bytes_bytes$",
        "otelcol_process_runtime_total_sys_memory_bytes") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_fileconsumer_open_files$", "otelcol_fileconsumer_open_files_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_fileconsumer_reading_files$", "otelcol_fileconsumer_reading_files_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_ip_lookup_miss$", "otelcol_otelsvc_k8s_ip_lookup_miss_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_added$", "otelcol_otelsvc_k8s_pod_added_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_updated$", "otelcol_otelsvc_k8s_pod_updated_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_deleted$", "otelcol_otelsvc_k8s_pod_deleted_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_accepted_log_records$",
        "otelcol_processor_accepted_log_records") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_accepted_metric_points$",
        "otelcol_processor_accepted_metric_points") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_accepted_spans$",
        "otelcol_processor_accepted_spans") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_refused_log_records$",
        "otelcol_processor_refused_log_records") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_refused_metric_points$",
        "otelcol_processor_refused_metric_points") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_refused_spans$",
        "otelcol_processor_refused_spans") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_filter_spans\\.filtered$",
        "otelcol_processor_filter_spans.filtered_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
    - context: resource
      statements:
      - set(resource.attributes["k8s.pod.ip"], resource.attributes["net.host.name"])
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - delete_key(resource.attributes, "service_name") where resource.attributes["service.name"]
        == "opentelemetry-collector"
    - context: datapoint
      statements:
      - delete_key(datapoint.attributes, "service_name") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - delete_key(datapoint.attributes, "otel_scope_name") where datapoint.attributes["service.name"]
        == "opentelemetry-collector"
  transform/semconv:
    error_mode: ignore
    trace_statements:
    - context: span
      statements:
      - set(span.attributes["http.method"], span.attributes["http.request.method"])
        where span.attributes["http.request.method"] != nil
receivers:
  filelog/iis:
    header:
      metadata_operators:
      - if: body matches "^#Fields:"
        parse_from: body
        regex: ^#Fields:\s+(?P<csv_header>.+)$
        type: regex_parser
      pattern: ^#.*$
    include:
    - C:\inetpub\logs\LogFiles\W3SVC*\*.log
    include_file_name: true
    include_file_path: false
    operators:
    - delimiter: ' '
      header_attribute: csv_header
      id: iis_csv_parser
      if: body != nil and body not matches "^#"
      trim_space: true
      type: csv_parser
    start_at: beginning
    storage: file_storage
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk: null
      filesystem:
        exclude_mount_points:
          match_type: strict
          mount_points:
          - ""
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network: null
      paging: null
      process:
        metrics:
          process.cpu.utilization:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.threads:
            enabled: true
        mute_process_all_errors: true
  iis:
    collection_interval: 30s
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}:4317
        max_recv_msg_size_mib: 20
      http:
        endpoint: ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}:4318
  prometheus:
    config:
      scrape_configs:
      - job_name: opentelemetry-collector
        scrape_interval: '30s'
        static_configs:
        - targets:
          - ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}:8888
  windowseventlog/application:
    channel: Application
  windowseventlog/security:
    channel: Security
  windowseventlog/system:
    channel: System
service:
  extensions:
  - health_check
  - opamp
  - file_storage
  - zpages
  - pprof
  pipelines:
    logs:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resourcedetection/region
      - resourcedetection/env
      - resource/metadata
      - transform/iis
      - batch
      receivers:
      - windowseventlog/system
      - windowseventlog/application
      - windowseventlog/security
      - filelog/iis
      - otlp
    logs/resource_catalog:
      exporters:
      - coralogix/resource_catalog
      processors:
      - memory_limiter
      - resource/metadata
      - resourcedetection/entity
      - resourcedetection/region
      - transform/entity-event
      receivers:
      - hostmetrics
    metrics:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resourcedetection/region
      - resourcedetection/env
      - resource/metadata
      - transform/prometheus
      - batch
      receivers:
      - hostmetrics
      - prometheus
      - iis
      - otlp
    traces:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resourcedetection/region
      - resourcedetection/env
      - resource/metadata
      - transform/semconv
      - batch
      receivers:
      - otlp
  telemetry:
    logs:
      encoding: json
    metrics:
      readers:
      - pull:
          exporter:
            prometheus:
              host: ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}
              port: 8888
              without_scope_info: false
              without_type_suffix: false
              without_units: false

