attributes:
  select:
    '*':
      include:
      - gen_ai.*
discovery:
  exclude_instrument:
  - exe_path: '*ebpf-instrument*'
  - exe_path: '*otelcol*'
  - exe_path: '*obi*'
  instrument:
  - open_ports: 1-65535
ebpf:
  buffer_sizes:
    http: 2048
    kafka: 4096
    mysql: 4096
    postgres: 4096
  payload_extraction:
    http:
      aws:
        enabled: true
      elasticsearch:
        enabled: true
      genai:
        anthropic:
          enabled: true
        embedding:
          enabled: true
        gemini:
          enabled: true
        mcp:
          enabled: true
        openai:
          enabled: true
        qwen:
          enabled: true
        rerank:
          enabled: true
        retrieval:
          enabled: true
      graphql:
        enabled: true
      jsonrpc:
        enabled: true
      sqlpp:
        enabled: true
  redis_db_cache:
    enabled: true
health_check:
  port: 0
otel_metrics_export:
  endpoint: http://127.0.0.1:4318
otel_traces_export:
  endpoint: http://127.0.0.1:4317
prometheus_export:
  path: /metrics
  port: 9090

