name: Telemetrygen-Windows

on:
  push:
    branches:
      - master
      - cds-840-follow-up
    paths:
      - "telemetrygen-windows-image/Dockerfile"
      - ".github/workflows/telemetrygen-windows-image.yml"

permissions:
  contents: read

env:
  REGISTRY_ORG: cgx.jfrog.io/coralogix-docker-images
  IMAGE_NAME: telemetrygen-windows

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to CGX JFrog
        uses: docker/login-action@v3
        with:
          registry: cgx.jfrog.io
          username: ${{ secrets.JFROG_USER }}
          password: ${{ secrets.JFROG_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # get upstream version from Dockerfile (e.g. v0.147.0 -> 0.147.0)
      - name: Set image version
        id: set-image-version
        run: echo "version=$(grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' ./telemetrygen-windows-image/Dockerfile | head -1 | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Build And Push Image To JFrog (Windows 2019)
        uses: docker/build-push-action@v5
        with:
          context: ./telemetrygen-windows-image/
          platforms: windows/amd64
          push: true
          build-args: |
            WIN_BASE_IMAGE=mcr.microsoft.com/windows/servercore:ltsc2019
          tags: |
            ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.set-image-version.outputs.version }}
            ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:latest

      - name: Build And Push Image To JFrog (Windows 2022)
        uses: docker/build-push-action@v5
        with:
          context: ./telemetrygen-windows-image/
          platforms: windows/amd64
          push: true
          build-args: |
            WIN_BASE_IMAGE=mcr.microsoft.com/windows/servercore:ltsc2022
          tags: |
            ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.set-image-version.outputs.version }}-windows2022

      # Verify image is reachable
      - name: Verify image on JFrog
        run: |
          echo "Checking ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:latest..."
          docker pull --platform windows/amd64 ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:latest
          echo "Checking ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.set-image-version.outputs.version }}-windows2022..."
          docker pull --platform windows/amd64 ${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.set-image-version.outputs.version }}-windows2022
